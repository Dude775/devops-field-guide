apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      serviceAccountName: app
      initContainers:
        - name: s3-fetch
          image: amazon/aws-cli
          command:
            - sh
            - -c
            - aws s3 cp s3://david-rubin-eks-irsa-lab-450963/README.md -
      containers:
        - name: nginx
          image: nginx:1.14.2
          ports:
            - containerPort: 80
