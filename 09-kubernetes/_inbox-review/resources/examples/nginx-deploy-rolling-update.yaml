apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
  annotations:
    # change-cause נשמר ב-rollout history
    kubernetes.io/change-cause: "Fix incorrect tag back to 1.27.1-alpine"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.1-alpine
          ports:
            - containerPort: 80
